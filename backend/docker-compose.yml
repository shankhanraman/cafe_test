services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: arogya
      POSTGRES_PASSWORD: arogya
      POSTGRES_DB: arogya
    ports:
      - "5440:5432"          # host:container — 5440 avoids the native PG on 5432/5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arogya -d arogya"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - arogya-pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy   # app starts only after db is ready
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/arogya
      SPRING_DATASOURCE_USERNAME: arogya
      SPRING_DATASOURCE_PASSWORD: arogya
    ports:
      - "8080:8080"

volumes:
  arogya-pgdata:
