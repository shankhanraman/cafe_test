spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/arogya
    username: arogya
    password: arogya
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true          # exposes /actuator/health/{readiness,liveness} for k8s
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
