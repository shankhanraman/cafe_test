# NOTE: Do NOT commit real values. Apply this with real values via `kubectl apply`,
# or (recommended) manage it with external-secrets / AWS Secrets Manager.
# SPRING_DATASOURCE_URL should point at a managed Postgres (e.g. AWS RDS), not localhost.
apiVersion: v1
kind: Secret
metadata:
  name: cafe-test-backend-secrets
  namespace: cafe-test
type: Opaque
stringData:
  # Points at the in-cluster Postgres (infra/k8s/postgres). Swap host for an RDS endpoint for prod.
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres.cafe-test.svc.cluster.local:5432/arogya"
  SPRING_DATASOURCE_USERNAME: "arogya"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME"   # must match POSTGRES_PASSWORD in the postgres secret
