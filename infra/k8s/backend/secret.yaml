# NOTE: Do NOT commit real values. Apply this with real values via `kubectl apply`,
# or (recommended) manage it with external-secrets / AWS Secrets Manager.
# SPRING_DATASOURCE_URL should point at a managed Postgres (e.g. AWS RDS), not localhost.
apiVersion: v1
kind: Secret
metadata:
  name: cafe-test-backend-secrets
  namespace: cafe-test
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "REPLACE_ME"        # jdbc:postgresql://<rds-endpoint>:5432/arogya
  SPRING_DATASOURCE_USERNAME: "REPLACE_ME"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME"
