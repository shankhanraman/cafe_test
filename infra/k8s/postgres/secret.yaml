# Postgres credentials. Do NOT commit real values — apply via kubectl or external-secrets.
# For a throwaway dev DB, arogya/arogya is fine; use a strong password for anything real.
apiVersion: v1
kind: Secret
metadata:
  name: cafe-test-postgres-secrets
  namespace: cafe-test
type: Opaque
stringData:
  POSTGRES_USER: "arogya"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "arogya"
