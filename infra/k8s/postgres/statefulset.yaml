apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cafe-test-postgres
  namespace: cafe-test
  labels:
    app: cafe-test-postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: cafe-test-postgres
  template:
    metadata:
      labels:
        app: cafe-test-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: cafe-test-postgres-secrets
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "arogya", "-d", "arogya"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "arogya", "-d", "arogya"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
