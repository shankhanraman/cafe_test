name: frontend-ci

on:
  pull_request:
    paths: ['frontend/**']
  push:
    branches: [main]
    paths: ['frontend/**']

defaults:
  run:
    working-directory: frontend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml }

      - run: pnpm install --frozen-lockfile
      - run: pnpm gen

      # Contract-drift fitness function: generated client must match the committed spec.
      - name: Contract drift check
        run: git diff --exit-code src/api/generated || (echo "::error::src/api/generated is stale — run 'pnpm gen' and commit." && exit 1)

      - run: pnpm validate:fixtures   # fixtures typed + cover every row state + unreadable
      - run: pnpm typecheck
      - run: pnpm lint                # includes jsx-a11y + no-raw-network backstop
      - run: pnpm test                # Vitest incl. the gated-confirm invariant
      - run: pnpm build

      - name: E2E (critical flows)
        run: pnpm exec playwright install --with-deps && pnpm e2e
